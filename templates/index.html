<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #296a33, #bbf8c4);
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgb(134, 201, 181);
            width: min(92vw, 420px);
        }
        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
        }
    </style>
</head>

<body style="font-family: Fantasy;">

    <div class="page">
        <div class="card shadow-lg p-4 converter-card">
        <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" step="0.01" name="amount" 
                       class="form-control form-control-lg" 
                       placeholder="Introduce cantidad" required>
            </div>

            <div class="row mb-3 g-2 align-items-center">
                <div class="col-12 col-sm-5">
                    <select name="from_currency" class="form-select">
                        <option value="EUR">EUR €</option>
                        <option value="USD">USD $</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
                <div class="col-12 col-sm-2 text-center">
                    →
                </div>
                <div class="col-12 col-sm-5">
                    <select name="to_currency" class="form-select">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    Convertir
                </button>
            </div>
        </form>

        {% if result is not none %}
            <div class="mt-4 text-center result-box">
                {{ result }}
            </div>
        {% endif %}
        {% if error %}
            <div class="alert alert-danger mt-3 mb-0 text-center">
                {{ error }}
            </div>
        {% endif %}
        </div>
    </div>

</body>
</html>
