<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, #296a33, #bbf8c4);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .top-nav {
            background: rgba(13, 32, 64, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.3px;
            text-decoration: none;
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #296a33, #bbf8c4);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }
        .nav-links {
            display: flex;
            gap: 1.1rem;
        }
        .nav-links a {
            color: #dbe9ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
        }
        .page-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgb(134, 201, 181);
            width: min(420px, 100%);
        }
        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
        }
        .title-main {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        @media (max-width: 576px) {
            .nav-links {
                gap: 0.75rem;
                font-size: 0.95rem;
            }
            .brand {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body style="font-family: Fantasy;">

    <nav class="navbar navbar-expand-sm top-nav px-3 px-md-4 py-3">
        <div class="container-fluid p-0">
            <a class="brand" href="#">
                <span class="brand-logo">$</span>
                <span>CurrencyFlow</span>
            </a>
            <div class="nav-links ms-auto">
                <a href="#">Inicio</a>
                <a href="#">Tasas</a>
                <a href="#">Ayuda</a>
            </div>
        </div>
    </nav>

    <main class="page-content">

    <div class="card shadow-lg p-4 converter-card">
        <h2 class="text-center mb-4 title-main">Conversor de Divisas</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" step="0.01" name="amount" 
                       class="form-control form-control-lg" 
                       placeholder="Introduce cantidad" required>
            </div>

            <div class="row mb-3 g-2 align-items-center">
                <div class="col-12 col-sm-5">
                    <select name="from_currency" class="form-select">
                        <option value="EUR">EUR €</option>
                        <option value="USD">USD $</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
                <div class="col-12 col-sm-2 text-center">
                    →
                </div>
                <div class="col-12 col-sm-5">
                    <select name="to_currency" class="form-select">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    Convertir
                </button>
            </div>
        </form>

        {% if result is not none %}
            <div class="mt-4 text-center result-box">
                {{ result }}
            </div>
        {% endif %}
        {% if error %}
            <div class="alert alert-danger mt-3 mb-0 text-center">
                {{ error }}
            </div>
        {% endif %}
        </div>
    </div>

    </main>

</body>
</html>
